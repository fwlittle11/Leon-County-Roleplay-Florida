<!-- APPLICATION FORM -->

<section class="application-form">


<h1>Tallahassee Police Department</h1>


<div class="form-group">

<label>Discord Username</label>

<input type="text" placeholder="Enter your Discord username">

</div>




<div class="form-group">

<label>FiveM Username</label>

<input type="text" placeholder="Enter your FiveM name">

</div>




<div class="form-group">

<label>Age</label>

<input type="number" placeholder="Enter your age">




<div class="form-group">

<label>What is your previous roleplay experience?</label>

<textarea placeholder="Explain your experience..."></textarea>

</div>




<div class="form-group">

<label>Why do you want to join Law Enforcement?</label>

<textarea placeholder="Explain why you want to join..."></textarea>

</div>




<div class="form-group">

<label>What does professionalism mean to you?</label>

<textarea placeholder="Your answer..."></textarea>

</div>




<div class="form-group">

<label>Have you read and agreed to follow server rules?</label>

<select>

<option>Yes</option>

<option>No</option>

</select>

</div>




<div class="form-group">

<label>Why should we accept your application?</label>

<textarea placeholder="Explain why you should be accepted..."></textarea>

</div>




<button class="submit-button">
Submit Application
</button>
