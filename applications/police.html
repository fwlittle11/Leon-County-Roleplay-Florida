<section class="application-page">


<div class="application-box">


<h2>🚔 Police Department Application</h2>

<p>
Apply to join the Leon County Police Department.
Answer all questions honestly and professionally.
</p>



<form id="applicationForm">


<label>Discord Username</label>

<input 
name="Discord Username" 
type="text" 
placeholder="Enter your Discord username"
>



<label>FiveM Username</label>

<input 
name="FiveM Username" 
type="text" 
placeholder="Enter your FiveM name"
>



<label>Age</label>

<input 
name="Age" 
type="number" 
placeholder="Enter your age"
>



<label>How long have you been playing FiveM?</label>

<textarea 
name="FiveM Experience"
placeholder="Explain your experience">
</textarea>



<label>Why do you want to join the Police Department?</label>

<textarea 
name="Reason For Joining"
placeholder="Explain why you want to become a police officer">
</textarea>



<label>What does good roleplay mean to you?</label>

<textarea 
name="Roleplay Knowledge"
placeholder="Explain your understanding of quality RP">
</textarea>



<label>How would you handle a situation where another officer breaks server rules?</label>

<textarea 
name="Rule Violation Scenario"
placeholder="Your answer">
</textarea>



<label>Are you willing to follow department SOPs and Chain of Command?</label>

<select name="SOP Agreement">

<option>Select Answer</option>

<option>Yes</option>

<option>No</option>

</select>



<label>Do you understand that failure to follow rules may result in removal?</label>

<select name="Rules Agreement">

<option>Select Answer</option>

<option>Yes</option>

<option>No</option>

</select>



<button type="submit">
Submit Police Application
</button>



</form>


</div>
