<section class="application-page">


<div class="application-box">


<h2>⭐ Sheriff's Office Application</h2>

<p>
Apply to join the Leon County Sheriff's Office.
Serve the county through professional law enforcement roleplay.
</p>




<form id="applicationForm">


<label>Discord Username</label>

<input 
name="Discord Username"
type="text"
placeholder="Enter your Discord username"
>



<label>FiveM Username</label>

<input 
name="FiveM Username"
type="text"
placeholder="Enter your FiveM name"
>



<label>Age</label>

<input 
name="Age"
type="number"
placeholder="Enter your age"
>



<label>List all of your Previous LEO and Previous Roleplay Experience</label>

<textarea
name="RP Experience"
placeholder="Describe your previous RP experience">
</textarea>



<label>Why do you want to join the Leon County Sheriff's Office?</label>

<textarea
name="Reason For Joining"
placeholder="Explain why you want to become a deputy">
</textarea>



<label>What qualities make a good deputy?</label>

<textarea
name="Deputy Qualities"
placeholder="Your answer">
</textarea>



<label>How would you handle a traffic stop that becomes hostile?</label>

<textarea
name="Traffic Stop Scenario"
placeholder="Explain your response">
</textarea>



<label>How would you handle a fellow deputy violating department policy?</label>

<textarea
name="Policy Violation"
placeholder="Explain your response">
</textarea>



<label>Are you willing to follow the Leon County Sheriff's Office Chain of Command?</label>

<select name="Chain Of Command">

<option>Select Answer</option>

<option>Yes</option>

<option>No</option>

</select>



<label>Do you agree to follow all server rules and SOPs?</label>

<select name="Rules Agreement">

<option>Select Answer</option>

<option>Yes</option>

<option>No</option>

</select>




<button type="submit">
Submit Sheriff Application
</button>



</form>


</div>


</section>

</footer>

</body>
