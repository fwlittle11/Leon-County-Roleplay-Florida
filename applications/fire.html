<section class="application-form">


<h1>Fire Department & EMS Application</h1>



<div class="form-group">

<label>Discord Username</label>

<input type="text" placeholder="Enter your Discord username">

</div>



<div class="form-group">

<label>FiveM Username</label>

<input type="text" placeholder="Enter your FiveM name">

</div>



<div class="form-group">

<label>Age</label>

<input type="number" placeholder="Enter your age">

</div>



<div class="form-group">

<label>Have you been part of a Fire/EMS department before?</label>

<select>

<option>Yes</option>

<option>No</option>

</select>

</div>



<div class="form-group">

<label>Describe your previous roleplay experience</label>

<textarea placeholder="Explain your experience..."></textarea>

</div>



<div class="form-group">

<label>Why do you want to join the Fire Department?</label>

<textarea placeholder="Explain your reason for applying..."></textarea>

</div>



<div class="form-group">

<label>What qualities make a good Firefighter/EMT?</label>

<textarea placeholder="Your answer..."></textarea>

</div>



<div class="form-group">

<label>How would you handle a major emergency scene?</label>

<textarea placeholder="Explain your response..."></textarea>

</div>



<div class="form-group">

<label>Are you willing to complete training and follow department policies?</label>

<select>

<option>Yes</option>

<option>No</option>

</select>

</div>



<div class="form-group">

<label>What role are you interested in?</label>

<select>

<option>Firefighter</option>

<option>EMT</option>

<option>Paramedic</option>

<option>Fire Rescue</option>

</select>

</div>



<div class="form-group">

<label>Why should we accept your application?</label>

<textarea placeholder="Explain why you should be selected..."></textarea>

</div>



<button class="submit-button">

Submit Application

</button>



</section>




<footer>

<p>
© 2026 Leon County Roleplay
</p>

</footer>



</body>

</html>
