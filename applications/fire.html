<section class="application-page">


<div class="application-box">


<h2>🚒 Fire Department Application</h2>

<p>
Apply to join Leon County Fire Rescue.
Respond to emergencies, protect the community, and provide professional fire & rescue roleplay.
</p>




<form id="applicationForm">
<input type="hidden" name="type" value="Fire">


<label>Discord Username</label>

<input 
name="Discord Username"
type="text"
placeholder="Enter your Discord username"
>



<label>FiveM Username</label>

<input 
name="FiveM Username"
type="text"
placeholder="Enter your FiveM name"
>



<label>Age</label>

<input 
name="Age"
type="number"
placeholder="Enter your age"
>



<label>Previous Fire/EMS Roleplay Experience</label>

<textarea
name="Emergency Experience"
placeholder="Describe your previous experience">
</textarea>



<label>Why do you want to join Fire Rescue?</label>

<textarea
name="Reason For Joining"
placeholder="Explain why you want to become a firefighter">
</textarea>



<label>What are the responsibilities of a firefighter?</label>

<textarea
name="Firefighter Responsibilities"
placeholder="Your answer">
</textarea>



<label>How would you handle arriving at a major emergency scene?</label>

<textarea
name="Emergency Scenario"
placeholder="Explain your actions">
</textarea>



<label>How important is teamwork in Fire Rescue?</label>

<textarea
name="Teamwork"
placeholder="Explain your answer">
</textarea>



<label>Are you willing to follow Fire Department SOPs?</label>

<select name="SOP Agreement">

<option>Select Answer</option>

<option>Yes</option>

<option>No</option>

</select>



<label>Are you willing to work with Law Enforcement and EMS?</label>

<select name="Multi Department Cooperation">

<option>Select Answer</option>

<option>Yes</option>

<option>No</option>

</select>




<button type="submit">
Submit Fire Application
</button>



</form>


</div>


</section>
