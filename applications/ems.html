<section class="application-form">


<h1>Civilian Application</h1>




<div class="form-group">

<label>Discord Username</label>

<input type="text" placeholder="Enter your Discord username">

</div>




<div class="form-group">

<label>FiveM Username</label>

<input type="text" placeholder="Enter your FiveM name">

</div>




<div class="form-group">

<label>Age</label>

<input type="number" placeholder="Enter your age">

</div>




<div class="form-group">

<label>What type of civilian roleplay are you interested in?</label>

<select>

<option>Business Owner</option>

<option>Employee</option>

<option>Criminal Roleplay</option>

<option>Custom Character</option>

<option>Other</option>

</select>

</div>




<div class="form-group">

<label>Describe your character</label>

<textarea placeholder="Tell us about your character..."></textarea>

</div>




<div class="form-group">

<label>What is your roleplay experience?</label>

<textarea placeholder="Explain your experience..."></textarea>

</div>




<div class="form-group">

<label>What kind of story do you want to create in Leon County?</label>

<textarea placeholder="Explain your goals..."></textarea>

</div>




<div class="form-group">

<label>How do you handle conflicts during roleplay?</label>

<textarea placeholder="Your answer..."></textarea>

</div>




<div class="form-group">

<label>Do you agree to follow server rules and roleplay standards?</label>

<select>

<option>Yes</option>

<option>No</option>

</select>

</div>




<div class="form-group">

<label>Anything else you would like us to know?</label>

<textarea placeholder="Additional information..."></textarea>

</div>




<button class="submit-button">

Submit Application

</button>



</section>
