<section class="application-page">


<div class="application-box">


<h2>🚑 Emergency Medical Services Application</h2>

<p>
Apply to join Leon County EMS.
Provide medical response, patient care, and professional emergency roleplay.
</p>




<form id="applicationForm">



<label>Discord Username</label>

<input 
name="Discord Username"
type="text"
placeholder="Enter your Discord username"
>



<label>FiveM Username</label>

<input 
name="FiveM Username"
type="text"
placeholder="Enter your FiveM name"
>



<label>Age</label>

<input 
name="Age"
type="number"
placeholder="Enter your age"
>



<label>Previous EMS/Medical Roleplay Experience</label>

<textarea
name="EMS Experience"
placeholder="Describe your previous EMS experience">
</textarea>



<label>Why do you want to join EMS?</label>

<textarea
name="Reason For Joining"
placeholder="Explain why you want to become a medic">
</textarea>



<label>What are the responsibilities of an EMS member?</label>

<textarea
name="EMS Responsibilities"
placeholder="Your answer">
</textarea>



<label>How would you respond to a major accident scene?</label>

<textarea
name="Emergency Scenario"
placeholder="Explain your actions">
</textarea>



<label>How would you handle multiple injured patients?</label>

<textarea
name="Multiple Patients"
placeholder="Explain your response">
</textarea>



<label>How important is communication during emergencies?</label>

<textarea
name="Communication"
placeholder="Explain your answer">
</textarea>



<label>Are you willing to follow EMS SOPs and Chain of Command?</label>

<select name="SOP Agreement">

<option>Select Answer</option>

<option>Yes</option>

<option>No</option>

</select>



<label>Are you willing to work with Fire and Law Enforcement?</label>

<select name="Department Cooperation">

<option>Select Answer</option>

<option>Yes</option>

<option>No</option>

</select>




<button type="submit">
Submit EMS Application
</button>



</form>


</div>


</section>

</body>
