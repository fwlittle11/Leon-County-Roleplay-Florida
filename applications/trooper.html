<section class="application-page">


<div class="application-box">


<h2>🚓 Florida Highway Patrol Application</h2>

<p>
Apply to join the Florida Highway Patrol.
Protect highways, enforce traffic laws, and provide professional statewide law enforcement roleplay.
</p>




<form id="applicationForm">
<input type="hidden" id="applicationType" value="FHP">


<label>Discord Username</label>

<input 
name="Discord Username"
type="text"
placeholder="Enter your Discord username"
>



<label>FiveM Username</label>

<input 
name="FiveM Username"
type="text"
placeholder="Enter your FiveM name"
>



<label>Age</label>

<input 
name="Age"
type="number"
placeholder="Enter your age"
>



<label>Describe your FiveM roleplay experience</label>

<textarea
name="RP Experience"
placeholder="Explain your experience with roleplay">
</textarea>



<label>Why do you want to join Florida Highway Patrol?</label>

<textarea
name="Reason For Joining"
placeholder="Explain why you want to become a FHP Trooper">
</textarea>



<label>What is the responsibility of a Florida State Trooper?</label>

<textarea
name="Trooper Responsibilities"
placeholder="Your answer">
</textarea>



<label>How would you handle a high-speed pursuit? (You choose with or without HSU a.k.a H.E.A.T)</label>

<textarea
name="Pursuit Scenario"
placeholder="Explain your actions">
</textarea>



<label>How would you handle a civilian refusing to cooperate?</label>

<textarea
name="Civilian Interaction"
placeholder="Explain your response">
</textarea>



<label>Are you familiar with traffic enforcement procedures?</label>

<select name="Traffic Enforcement Knowledge">

<option>Select Answer</option>

<option>Yes</option>

<option>No</option>

</select>



<label>Are you willing to follow FHP SOPs and Chain of Command?</label>

<select name="SOP Agreement">

<option>Select Answer</option>

<option>Yes</option>

<option>No</option>

</select>




<button type="submit">
Submit FHP Application
</button>



</form>


</div>


</section>
