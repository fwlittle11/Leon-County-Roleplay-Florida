<!-- APPLICATION FORM -->

<section class="application-form">


<h1>Florida Highway Patrol Application</h1>




<div class="form-group">

<label>Discord Username</label>

<input type="text" placeholder="Enter your Discord username">

</div>




<div class="form-group">

<label>FiveM Username</label>

<input type="text" placeholder="Enter your FiveM name">

</div>




<div class="form-group">

<label>Age</label>

<input type="number" placeholder="Enter your age">

</div>




<div class="form-group">

<label>Do you have previous law enforcement experience?</label>

<select>

<option>Yes</option>

<option>No</option>

</select>

</div>




<div class="form-group">

<label>Explain your previous roleplay experience</label>

<textarea placeholder="Describe your experience..."></textarea>

</div>




<div class="form-group">

<label>Why do you want to become a Florida State Trooper?</label>

<textarea placeholder="Explain your motivation..."></textarea>

</div>




<div class="form-group">

<label>What is the responsibility of a Highway Patrol Trooper?</label>

<textarea placeholder="Your answer..."></textarea>

</div>




<div class="form-group">

<label>How would you handle a high-speed pursuit?</label>

<textarea placeholder="Explain your decision making..."></textarea>

</div>




<div class="form-group">

<label>What does professionalism mean in law enforcement?</label>

<textarea placeholder="Your answer..."></textarea>

</div>




<div class="form-group">

<label>Are you willing to complete training and follow the chain of command?</label>

<select>

<option>Yes</option>

<option>No</option>

</select>

</div>




<div class="form-group">

<label>Why should FHP choose you?</label>

<textarea placeholder="Explain why you should be accepted..."></textarea>

</div>




<button class="submit-button">

Submit Application

</button>



</section>
